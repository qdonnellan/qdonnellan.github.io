---
layout: default
permalink: /all/
title: "All Blog Posts"
excerpt: "All of the blog posts I've written."
---

<div class="wrapper">
  <div class="post">
    <h1>All Posts</h1>
    {% for post in site.posts %}
      <p>
        <span class="home-date">{{ post.date | date: '%b %d, %Y' }}</span> <br />
        <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
      </p>
    {% endfor %}
  </div>
</div>
