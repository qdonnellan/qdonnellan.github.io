<div class="side-list col-sm-4 col-md-3 hidden-xs">
    {% include sidebar_header.html %}
    <ul class="post-list">
    {% for post in site.posts %}
        <li>
            <div class="post-date">{{ post.date | date: "%b %-d, %Y" }}</div>
            <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
        </li>
    {% endfor %}
    </ul>
    <div class="contact">
        <p><a href="http://stemroom.blogspot.com/">My old STEM education blog</a></p>
    </div>
</div>
