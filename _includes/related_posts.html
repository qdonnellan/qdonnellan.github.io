<div class="related-posts">
  <h3>Related Posts</h3>

  {% for post in site.posts %}
    {% if post.url != page.url %}
      {% for tag in page.tags %}
        {% if post.tags contains tag %}
          <div class="related-post">
            <div class="date">{{ post.date | date: '%b %d, %Y'}}</div>
            <a href="{{ post.url }}">{{ post.title }}</a>
          </div>
          {% break %}
        {% endif %}
      {% endfor %}
    {% endif %}
  {% endfor %}

</div>
